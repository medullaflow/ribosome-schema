version = 1

# ribosome-schema is Apache-2.0 throughout, except the vendored third-party
# server.json schema, which keeps its upstream MIT license. Files that cannot
# carry a comment header (JSON, lockfiles) or where one would be unwelcome
# noise (LICENSE, NOTICE, and the top-level docs meant to be read as prose)
# are declared here instead (REUSE spec, https://reuse.software). Everything
# else — *.ts / *.js / *.yml / the pre-commit hook — carries an SPDX header
# in-file.

[[annotations]]
path = [
  "schema/**",
  "conformance/**",
  "package.json",
  "bindings/typescript/package.json",
  "bindings/typescript/tsconfig.json",
  "bindings/typescript/README.md",
  ".gitignore",
  "AUTHORS",
  "CONTRIBUTING.md",
  "ROADMAP.md",
  ".github/CODEOWNERS",
  "CHANGELOG.md",
  "README.md",
  "NOTICE",
  "LICENSE",
  "REUSE.toml",
  "bun.lock",
  "bindings/typescript/bun.lock",
  "biome.json",
  "vendor/README.md",
  "CODE_OF_CONDUCT.md",
  "SECURITY.md",
  ".github/ISSUE_TEMPLATE/bug_report.md",
  ".github/ISSUE_TEMPLATE/feature_request.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "© 2026 ribosome-schema contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "vendor/*.json"
precedence = "override"
SPDX-FileCopyrightText = "© Model Context Protocol authors"
SPDX-License-Identifier = "MIT"
