version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "npm"
    directory: "/bindings/typescript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Mirrors ribosome's own dependabot.yml: TypeScript 7.0 is a major
      # rewrite (native/Go-based) that broke ribosome's own tooling on
      # first contact. A type-checker major version deserves deliberate,
      # separate review, not an auto-opened PR.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
