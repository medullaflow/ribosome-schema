name: Dependency Audit

# Two complementary triggers, the same shape as dependency-review.yml +
# dependabot.yml: push/pull_request catches a newly-introduced vulnerable
# dependency landing in a PR; the weekly schedule catches a CVE disclosed
# LATER against a dependency already sitting in a lockfile -- something
# dependency-review-action can never see, since it only ever diffs a PR's
# manifest against its base. `bun audit` is already part of the toolchain in
# use here. Mirrors ribosome's own audit.yml (D35).
#
# Two separate audit steps, not one: this repo has two independent
# package.json/bun.lock pairs (root tooling deps, bindings/typescript's own
# publishable-package deps -- no npm workspaces, see package.json's own
# description) -- `bun audit` only ever looks at the current directory's
# lockfile, so each needs its own install + audit to actually be covered.
on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC -- matches dependabot's own cadence

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2

      # high/critical only: this is a CI gate, not an inbox -- low/moderate
      # advisories are still visible via `bun audit` locally or GitHub's own
      # Dependency Graph UI, but shouldn't block a merge on their own.
      - name: Audit root tooling dependencies
        run: bun install && bun audit --audit-level=high

      - name: Audit bindings/typescript dependencies
        working-directory: bindings/typescript
        run: bun install && bun audit --audit-level=high
