name: DCO

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Check Signed-off-by on every commit
        run: bun scripts/check-dco.js ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
