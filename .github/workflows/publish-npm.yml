# Publishes bindings/typescript to npm as @medullaflow/ribosome-schema.
# Gated on a published GitHub Release (not on every tag push) so a publish is
# always a deliberate, human-triggered action.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret, ever. The runner
# exchanges a short-lived GitHub OIDC token for npm publish rights; nothing
# long-lived is stored in this repo. Requires `id-token: write` below and, on
# npmjs.com, a Trusted Publisher configured for this exact repo + workflow
# filename (see docs.npmjs.com/trusted-publishers).
#
# KNOWN LIMITATION (npm/cli#8544): OIDC cannot publish the very FIRST version
# of a package that has never existed on the registry — npmjs.com requires the
# package to already exist before you can configure a Trusted Publisher for it.
# So bootstrapping is a one-time manual step OUTSIDE this workflow:
#   cd bindings/typescript && npm login && npm publish --access public
# Do this once for v0.1.0, from a local machine. Every release after that goes
# through this workflow with zero tokens.
#
# One-time manual step this workflow cannot do: on npmjs.com, package Settings
# → Trusted Publisher → GitHub Actions →
#   Organization or user: medullaflow
#   Repository: ribosome-schema
#   Workflow filename: publish-npm.yml   (filename only, not the path — case-sensitive)
#   Allowed actions: npm publish
#
# Two toolchains, deliberately: install/build run on bun (this repo's own
# tooling, see docs/ARCHITECTURE.md in ribosome, D14), but `bun publish` does
# not yet support npm's OIDC trusted publishing (oven-sh/bun#24855, still
# open) — so the actual publish step stays on the npm CLI specifically.
#
# Do NOT `npm install -g npm@latest`: Node 24's setup-node image already
# bundles npm >= 11.5.1 (verified: 11.16.0), so it already satisfies trusted
# publishing's version floor — and reinstalling "latest" from the registry
# is what broke this. `libnpmpublish` unconditionally `require`s `sigstore`
# at module load (trusted publishing auto-generates a provenance attestation
# — no --provenance flag needed to trigger the attempt — so that module
# always loads on this path), and the freshly npm-installed "latest" build
# was missing it (`Cannot find module 'sigstore'`), while the bundled one has
# it correctly. Passing --no-provenance does NOT avoid this: it only skips
# using the module once loaded, not the `require` itself, so the crash
# happens either way. The bundled npm sidesteps the bug entirely — no flag
# needed, and provenance attestation works as a bonus.

name: publish-npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # No NODE_AUTH_TOKEN here — setting one would make npm fall back to
      # legacy token auth instead of OIDC trusted publishing.
      - run: npm publish --access public
        working-directory: bindings/typescript
