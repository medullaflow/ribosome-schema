name: Secret Scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The gitleaks CLI directly, not gitleaks/gitleaks-action -- that
      # wrapper action requires a paid GITLEAKS_LICENSE for organization-
      # owned repositories (medullaflow is one); the underlying gitleaks
      # CLI itself is MIT-licensed and free for this exact use unconditionally.
      # Mirrors ribosome's own secret-scan.yml (D31) -- version pinned
      # deliberately rather than always-latest.
      - name: Install gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Scan for secret-shaped strings (working tree + full commit history)
        run: gitleaks detect --source . --verbose --redact
