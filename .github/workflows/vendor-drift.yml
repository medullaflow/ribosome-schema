# Detects drift in the vendored MCP server.json schema: verifies the vendored
# file and the upstream pinned URL still match the SHA-256 recorded in
# bindings/typescript/src/version.ts. Detection is automated; the actual pin
# bump stays a human-reviewed PR (bun run vendor:update). On drift, opens/
# updates a tracking issue.

name: vendor-drift

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - id: drift
        run: bun run vendor:check
      - if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Vendored server.json schema drift detected";
            const body = [
              "`bun run vendor:check` failed — the vendored MCP server.json schema no",
              "longer matches the SHA-256 pinned in `bindings/typescript/src/version.ts`,",
              "or upstream changed a frozen version.",
              "",
              `See the failed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Resolve by reviewing the change and, if adopting it, running",
              "`bun run vendor:update <YYYY-MM-DD>` in a PR.",
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "vendor-drift",
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["vendor-drift"],
              });
            }
